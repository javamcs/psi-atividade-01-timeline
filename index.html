<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho de Psicologia - Timeline</title>
    <link href="resources/bootstrap.min.css" rel="stylesheet">
    <script src="resources/papaparse.min.js"></script>
    <link href="resources/timeline.min.css" rel="stylesheet">
    <link href="resources/timesheet.min.css" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-0 px-0">
                <div class="px-3 pt-3 pb-2">
                    <h1 class="h5 mb-1">Timeline - Trabalho de Psicologia</h1>
                </div>
                <ul class="nav nav-tabs px-3 pt-1 border-bottom-0" id="mainTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="timeline-tab" data-bs-toggle="tab" data-bs-target="#timeline-pane" type="button" role="tab" aria-controls="timeline-pane" aria-selected="true">Linha do tempo</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="timesheet-tab" data-bs-toggle="tab" data-bs-target="#timesheet-pane" type="button" role="tab" aria-controls="timesheet-pane" aria-selected="false">Linha do tempo da vida</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="table-tab" data-bs-toggle="tab" data-bs-target="#table-pane" type="button" role="tab" aria-controls="table-pane" aria-selected="false">Base de dados</button>
                    </li>
                </ul>
            </div>
            <div class="card-body p-0">
                <div class="tab-content" id="mainTabContent">
                    <div class="tab-pane fade show active p-3" id="timeline-pane" role="tabpanel" aria-labelledby="timeline-tab" tabindex="0">
                        <div class="d-flex justify-content-end mb-2 no-print">
                            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="window.print()">
                                Imprimir
                            </button>
                        </div>
                        <div id="timeline-embed" class="timeline bg-white p-3 p-md-4" data-mode="vertical" data-vertical-start-position="left" data-vertical-trigger="150px">
                            <div class="timeline__wrap">
                                <div id="vertical-timeline-list" class="timeline__items"></div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade p-3" id="timesheet-pane" role="tabpanel" aria-labelledby="timesheet-tab" tabindex="0">
                        <div id="timesheet-content" class="timesheet-wrap"></div>
                    </div>
                    <div class="tab-pane fade p-3" id="table-pane" role="tabpanel" aria-labelledby="table-tab" tabindex="0">
                        <div class="d-flex justify-content-end mb-2">
                            <a href="https://docs.google.com/spreadsheets/d/1AoLpQDO2b85O3-EpAgfl5vM0AAKg7tZTPou6R3cGBBw/edit?usp=sharing" target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-outline-secondary">
                                Origem dos dados
                            </a>
                        </div>
                        <div id="table-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <template id="timeline-item-template">
        <div class="timeline__item">
            <div class="timeline__content">
                <div class="vt-meta">
                    <p class="vt-autor js-vt-autor"></p>
                    <p class="vt-ano js-vt-ano"></p>
                </div>
                <div class="vt-grid">
                    <div class="vt-col">
                        <figure class="vt-figure d-none">
                            <img class="js-vt-img" alt="">
                    </figure>
                        <p class="vt-label js-vt-corrente">Ideias centrais</p>
                        <div class="vt-value js-vt-ideias"></div>
                        <button type="button" class="btn btn-link btn-sm p-0 mt-1 js-vt-toggle d-none" aria-expanded="false">Ver mais</button>
                    </div>
                    <div class="vt-col vt-col--ref">
                        <div class="vt-value js-vt-ref"></div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="resources/timeline.min.js"></script>
    <script src="resources/timesheet.min.js"></script>
    <script src="resources/bootstrap.bundle.min.js"></script>
    <script src="data-utils.js"></script>
    <script src="timeline.js"></script>
    <script src="table.js"></script>
    <script src="timesheet-view.js"></script>
    <script src="app.js"></script>
</body>
</html>
